function getFraisPort() {
  if (boutique && boutique.fpGratuitActif) {

    if (totalPanier() >= seuil) return 0;
  }
  return FRAIS_PORT_BASE;
}

function getProduitByRef(ref) {
  for (var cat in BAA_PRODUITS) {
    var found = BAA_PRODUITS[cat].produits.find(function(p){
      var prodKey = (function(p){ if(p.ref!=="—")return p.ref; var n=p.nom.replace(/[àâä]/g,"a").replace(/[éèêë]/g,"e").replace(/[îï]/g,"i").replace(/[ôö]/g,"o").replace(/[ùûü]/g,"u").replace(/ç/g,"c").replace(/[^a-zA-Z0-9]/g,"_").replace(/_+/g,"_").slice(0,40); return "prod_"+n; })(p);
      return p.ref === ref || prodKey === ref;
    });
    if (found) return found;
  }
  return null;
}

function totalPanier() {
  var total = 0;
  Object.keys(panier).forEach(function(ref) {
    var prod = getProduitByRef(ref);
    if (prod) {
      var prixFinal = (boutique && boutique.prixCustom && boutique.prixCustom[ref]) || prod.prix;
      total += prixFinal * panier[ref];
    }
  });
  return total;
}

function nbPanier() {
  return Object.values(panier).reduce(function(a,b){ return a+b; }, 0);
}

      box.appendChild(item);
    });

    var portDiv = document.createElement("div");
    portDiv.className = "port";
    portDiv.innerHTML = "📦 Frais de port : <strong>" + (getFraisPort() === 0 ? "🎉 OFFERTS !" : getFraisPort().toFixed(2) + " €") + "</strong>";
    box.appendChild(portDiv);

    if (boutique && boutique.fpGratuitActif) {
      var seuil2 = boutique.fpGratuitSeuil || 60;
      var fpMsg = document.createElement("div");

        fpMsg.style.cssText = "background:#f8f3ee;border:1px solid #e8d4b0;border-radius:10px;padding:8px;margin-bottom:8px;text-align:center;";
        fpMsg.innerHTML = "<p style='color:#8b735d;font-size:12px;margin:0;'>🚚 Plus que <b>" + (seuil2-totalPanier()).toFixed(2) + "€</b> pour les frais de port offerts !</p>";
      }
      box.appendChild(fpMsg);

function produitDansBoutique(p, produits) {
  if (!produits) return false;
  // Filtrer uniquement les strings (ignorer les maps des produits favoris)
  var produitsStrings = produits.filter(function(x){ return typeof x === "string"; });
  var prodKey = (function(p){ if(p.ref!=="—")return p.ref; var n=p.nom.replace(/[àâä]/g,"a").replace(/[éèêë]/g,"e").replace(/[îï]/g,"i").replace(/[ôö]/g,"o").replace(/[ùûü]/g,"u").replace(/ç/g,"c").replace(/[^a-zA-Z0-9]/g,"_").replace(/_+/g,"_").slice(0,40); return "prod_"+n; })(p);
  return produitsStrings.includes(prodKey) || produitsStrings.includes(p.ref);
}

function trouverProduit(nomProd) {
  var nomLow = nomProd.toLowerCase().replace(/[^a-z0-9 ]/g,"");
  var mots = nomLow.split(" ").filter(function(m){ return m.length > 3; });
  var meilleur = null; var meilleurScore = 0; var meilleurKey = null;
  for (var cat in BAA_PRODUITS) {
    BAA_PRODUITS[cat].produits.forEach(function(p) {
      var pLow = p.nom.toLowerCase().replace(/[^a-z0-9 ]/g,"");
      var score = 0;
      mots.forEach(function(mot){ if(pLow.includes(mot)) score++; });
      if (score > meilleurScore) { meilleurScore = score; meilleur = p; meilleurKey = p.ref === "—" ? "prod_" + p.nom.replace(/[^a-zA-Z0-9]/g,"_").slice(0,40) : p.ref; }
    });
  }
  return meilleurScore > 0 ? {prod: meilleur, key: meilleurKey} : null;
}

      var cmdDiv = document.createElement("div"); cmdDiv.style.cssText="background:white;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #e8d4b0;";
      var date = cmd.date ? new Date(cmd.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}) : "";
      cmdDiv.innerHTML = "<p style='color:#8b735d;font-size:11px;font-weight:bold;margin:0 0 4px;'>📅 "+date+"</p><p style='color:#3a3a3a;font-size:13px;margin:0 0 4px;'>"+cmd.detail+"</p><p style='color:#c9a86a;font-size:14px;font-weight:bold;margin:0;'>"+cmd.total+"</p>";
      histDiv.appendChild(cmdDiv);
    });
  }).catch(function() {
    histDiv.innerHTML = "<p style='color:#999;font-size:13px;text-align:center;padding:10px;'>Chargement des commandes...</p>";
  });

  box.appendChild(sectionCommandes);
  box.appendChild(sectionWish);
  box.appendChild(sectionFid);

  // Bouton déconnexion
  var logoutBtn = document.createElement("button");
  logoutBtn.textContent = "🚪 Se déconnecter";
  logoutBtn.style.cssText="width:100%;background:#fee;color:#e74c3c;border:1px solid #e74c3c;padding:12px;border-radius:12px;font-weight:bold;font-size:14px;cursor:pointer;touch-action:manipulation;";
  logoutBtn.onclick = function() {
    auth.signOut().then(function() { modal.remove(); });
  };
  box.appendChild(logoutBtn);
  var iosSpace = document.createElement("div"); iosSpace.style.height="40px"; box.appendChild(iosSpace);
}

</script>
</body>
</html>
