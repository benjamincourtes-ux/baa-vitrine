  footer.innerHTML="<p>Plateforme créée par "+( b.prenom||"votre conseillère")+" — Conseillère indépendante Mihi</p><p style='margin-top:4px;'>Cette page n'est pas le site officiel Mihi</p>";
  section.appendChild(footer);

  app.appendChild(section);

  // Enregistrer la visite
  db.collection("boutiques").doc(uid).collection("stats").doc("recrutement").set({
    visites:firebase.firestore.FieldValue.increment(1),
    derniereVisite:new Date().toISOString()
  },{merge:true}).catch(function(){});
}

// Charger les données
var uid = getUid();
if (!uid) {
  document.getElementById("app").innerHTML = "<div style='text-align:center;padding:60px 20px;'><p style='color:#e74c3c;font-size:16px;'>Lien invalide. Demande le lien correct à ta conseillère.</p></div>";
} else {
  db.collection("boutiques").doc(uid).get().then(function(snap) {
    if (!snap.exists || !snap.data().actif) {
      document.getElementById("app").innerHTML = "<div style='text-align:center;padding:60px 20px;'><p style='color:#8b735d;font-size:16px;'>Cette page n'est pas encore configurée.</p></div>";
      return;
    }
    renderPage(snap.data());
  }).catch(function(e) {
    document.getElementById("app").innerHTML = "<div style='text-align:center;padding:60px 20px;'><p style='color:#e74c3c;'>Erreur de chargement.</p></div>";
  });
}
</script>
</body>
</html>
